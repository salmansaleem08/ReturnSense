<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ReturnSense</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      color: #262626;
      background: #fafafa;
    }
    .header {
      background: #ffffff;
      border-bottom: 1px solid #e5e5e5;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-img {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      display: block;
    }
    .logo-text { font-weight: 600; font-size: 15px; color: #262626; }
    .body { padding: 20px 16px; }
    .input {
      width: 100%;
      background: #ffffff;
      border: 1px solid #e5e5e5;
      border-radius: 6px;
      padding: 9px 10px;
      font-size: 13px;
      color: #262626;
      margin-bottom: 8px;
      outline: none;
    }
    .input:focus { border-color: #a3a3a3; }
    .btn-primary {
      width: 100%;
      background: #00b67b;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
    }
    .btn-primary:hover { background: #009e6a; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
    .error { font-size: 12px; color: #ed4956; margin-top: 8px; text-align: center; }
    .user-info { text-align: center; padding: 10px 0; }
    .username { font-weight: 600; font-size: 15px; }
    .email { font-size: 12px; color: #737373; margin-top: 2px; }
    .btn-secondary {
      width: 100%;
      background: transparent;
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      padding: 7px;
      font-size: 13px;
      color: #262626;
      cursor: pointer;
      margin-top: 12px;
    }
    .status { font-size: 12px; color: #737373; text-align: center; margin-top: 8px; }
    .link { color: #00b67b; text-decoration: none; font-weight: 600; }
    .config-hint { font-size: 11px; color: #ed4956; margin-top: 8px; line-height: 1.35; }
    @media (prefers-color-scheme: dark) {
      body { background: #121212; color: #fafafa; }
      .header { background: #1a1a1a; border-bottom-color: #333; }
      .logo-text { color: #fafafa; }
      .input { background: #262626; border-color: #404040; color: #fafafa; }
      .btn-secondary { border-color: #404040; color: #fafafa; }
      .email, .status { color: #a3a3a3; }
    }
  </style>
</head>
<body>
  <div class="header">
    <img class="logo-img" src="icons/brand-mark.svg" width="28" height="28" alt="" />
    <span class="logo-text">ReturnSense</span>
  </div>
  <div class="body" id="popup-body">
    <div id="loading-state">
      <p class="status">Loading...</p>
    </div>
  </div>
  <script src="popup-config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
