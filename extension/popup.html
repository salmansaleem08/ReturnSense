<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ReturnSense</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      color: #262626;
      background: #FAFAFA;
    }
    .header {
      background: #FFFFFF;
      border-bottom: 1px solid #DBDBDB;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo {
      width: 28px; height: 28px;
      background: #262626;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      color: white; font-weight: 700; font-size: 16px;
      font-family: Georgia, serif;
    }
    .logo-text { font-weight: 600; font-size: 15px; }
    .body { padding: 20px 16px; }
    .input {
      width: 100%;
      background: #FAFAFA;
      border: 1px solid #DBDBDB;
      border-radius: 6px;
      padding: 9px 10px;
      font-size: 13px;
      color: #262626;
      margin-bottom: 8px;
      outline: none;
    }
    .input:focus { border-color: #A8A8A8; background: white; }
    .btn-primary {
      width: 100%;
      background: #0095F6;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
    }
    .btn-primary:hover { background: #1877F2; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
    .error { font-size: 12px; color: #ED4956; margin-top: 8px; text-align: center; }
    .user-info { text-align: center; padding: 10px 0; }
    .username { font-weight: 600; font-size: 15px; }
    .email { font-size: 12px; color: #8E8E8E; margin-top: 2px; }
    .btn-secondary {
      width: 100%;
      background: transparent;
      border: 1px solid #DBDBDB;
      border-radius: 8px;
      padding: 7px;
      font-size: 13px;
      color: #262626;
      cursor: pointer;
      margin-top: 12px;
    }
    .status { font-size: 12px; color: #8E8E8E; text-align: center; margin-top: 8px; }
    .link { color: #0095F6; text-decoration: none; font-weight: 600; }
    .config-hint { font-size: 11px; color: #ED4956; margin-top: 8px; line-height: 1.35; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">R</div>
    <span class="logo-text">ReturnSense</span>
  </div>
  <div class="body" id="popup-body">
    <div id="loading-state">
      <p class="status">Loading...</p>
    </div>
  </div>
  <script src="popup-config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
