<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ReturnSense</title>
    <style>
      body {
        margin: 0;
        min-width: 320px;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f8fafc;
        color: #111827;
      }
      .card {
        margin: 16px;
        border: 1px solid #e5e7eb;
        border-radius: 16px;
        padding: 16px;
        background: #ffffff;
      }
      .badge {
        display: inline-block;
        padding: 4px 10px;
        border-radius: 999px;
        color: #1d4ed8;
        background: #dbeafe;
        font-size: 12px;
        font-weight: 600;
      }
      h1 {
        margin: 14px 0 8px;
        font-size: 18px;
      }
      p {
        margin: 0;
        color: #6b7280;
        font-size: 14px;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <section class="card">
      <span class="badge">Extension Ready</span>
      <h1>ReturnSense Companion</h1>
      <p>Isolated, scalable extension scaffold for local manual loading.</p>
    </section>
  </body>
</html>
